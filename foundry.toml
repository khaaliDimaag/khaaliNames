[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Compiler
solc = "0.8.28"
evm_version = "cancun"

# Optimizer
optimizer = true
optimizer_runs = 200

# fs permissions
fs_permissions = [
  { access = "read", path = "data/" },
  { access = "read-write", path = "deployments.json" },
]

[profile.default.env]
dotenv = ".env"

[profile.production]
via_ir = true
optimizer_runs = 20000

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=11155111" }
